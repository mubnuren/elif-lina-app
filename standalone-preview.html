<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Elif Lina - Hızlı Önizleme</title>
<style>
:root{--p:#6d28d9;--pink:#ec4899;--ink:#151244;--muted:#6b6a93;--bd:#ece7fb;--green:#22c55e}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(135deg,#fff7fb,#f3efff,#eef8ff);color:var(--ink)}.wrap{display:grid;grid-template-columns:260px 1fr;gap:14px;min-height:100vh;padding:12px}.side{background:linear-gradient(180deg,#30167f,#0a1745);color:#fff;border-radius:26px;padding:18px;display:flex;flex-direction:column}.logo{font-size:44px;font-weight:1000;text-shadow:0 4px 0 var(--pink);margin-bottom:6px}.girl{font-size:90px;text-align:center;margin:15px}.nav button{width:100%;display:block;text-align:left;border:0;background:transparent;color:#fff;padding:12px 14px;border-radius:14px;font-weight:850;margin:4px 0;cursor:pointer}.nav button.on,.nav button:hover{background:linear-gradient(90deg,var(--pink),#8b5cf6)}.main{display:grid;gap:14px}.top,.card{background:rgba(255,255,255,.86);border:1px solid var(--bd);box-shadow:0 18px 45px rgba(98,61,185,.12);border-radius:24px;padding:18px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.top h1{margin:0;font-size:30px}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:10px 14px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.span3{grid-column:span 3}.span4{grid-column:span 4}.span6{grid-column:span 6}.span12{grid-column:span 12}.ring{width:96px;height:96px;border-radius:50%;background:conic-gradient(var(--green) var(--pct),#e8e1f8 0);display:grid;place-items:center;position:relative}.ring:after{content:'';position:absolute;inset:12px;background:#fff;border-radius:50%}.ring b{z-index:1;font-size:26px}.task{display:grid;grid-template-columns:42px 1fr auto 30px;align-items:center;gap:10px;border:1px solid var(--bd);background:#fff;border-radius:16px;padding:12px;margin:10px 0;cursor:pointer}.task.done{background:linear-gradient(90deg,#ecfdf5,#fff)}.task em{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:#e8e1f8;color:#fff;font-style:normal;font-weight:1000}.task.done em{background:var(--green)}button.primary{background:linear-gradient(90deg,#ec4899,#7c3aed);color:#fff;border:0;border-radius:14px;padding:12px 16px;font-weight:950;cursor:pointer}.game,.reward,.badge{background:#fff;border:1px solid var(--bd);border-radius:18px;padding:14px;text-align:center}.games,.rewards,.badges{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.game{background:linear-gradient(135deg,#06b6d4,#2563eb);color:#fff}.game span,.reward span,.badge span{font-size:44px;display:block}.bar{height:10px;background:#e8e1f8;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#7c3aed,#ec4899);border-radius:inherit}.form{display:grid;grid-template-columns:1fr 160px 100px 70px auto;gap:10px}.form input,.form select{border:1px solid var(--bd);border-radius:13px;padding:12px;font-weight:800}.table{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden}.table th,.table td{padding:12px;border-bottom:1px solid var(--bd);text-align:left}.del{background:#ffe4e6;color:#e11d48;border:0;border-radius:10px;padding:8px 10px;font-weight:900}.map{height:280px;background:linear-gradient(#bfefff,#d9f99d 55%,#75b843);border-radius:20px;position:relative;overflow:hidden}.map:before{content:'';position:absolute;width:85%;height:110px;left:8%;top:95px;border-top:16px dashed #f7e1a7;border-radius:50%;transform:rotate(-8deg)}.node{position:absolute;width:48px;height:48px;border-radius:50%;background:#3b82f6;color:#fff;border:4px solid #fff;display:grid;place-items:center;font-weight:1000;font-size:21px}.n1{left:12%;top:46%}.n2{left:28%;top:68%}.n3{left:48%;top:75%}.n4{left:68%;top:55%}.n5{left:57%;top:30%;background:#f97316}.castle{position:absolute;right:40px;top:26px;font-size:64px}.treasure{position:absolute;right:50px;bottom:40px;font-size:64px}.chart{height:180px;display:flex;align-items:end;gap:12px}.col{flex:1;text-align:center}.col i{display:block;width:32px;margin:0 auto;background:linear-gradient(#8b5cf6,#60a5fa);border-radius:12px 12px 5px 5px}.hidden{display:none}@media(max-width:900px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.span3,.span4,.span6,.span12{grid-column:span 1}.games,.rewards,.badges{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr}.top{display:block}}
</style>
</head>
<body>
<div class="wrap">
  <aside class="side"><div class="logo">Elif Lina</div><b>Günlük Sorumluluk Programı</b><div class="girl">👧🏻</div><div class="nav"><button class="on" onclick="show('home',this)">🏠 Ana Sayfa</button><button onclick="show('tasks',this)">✅ Görevler</button><button onclick="show('games',this)">🎮 Mini Oyunlar</button><button onclick="show('map',this)">🗺️ Macera Haritası</button><button onclick="show('badges',this)">🏅 Rozetler</button><button onclick="show('parent',this)">👨‍👩‍👧 Ebeveyn Paneli</button></div></aside>
  <main class="main"><div class="top"><div><h1>Merhaba Elif Lina! 👋</h1><b>Bugün harika işler seni bekliyor.</b></div><div class="stats"><span class="pill">⭐ <b id="stars">125</b></span><span class="pill">🛡️ Seviye 4</span><span class="pill">🔥 7 gün</span></div></div>
    <section id="home" class="page grid"></section><section id="tasks" class="page card hidden"></section><section id="games" class="page card hidden"></section><section id="map" class="page card hidden"></section><section id="badges" class="page card hidden"></section><section id="parent" class="page card hidden"></section>
  </main>
</div>
<script>
let tasks=JSON.parse(localStorage.elifPreviewTasks||'null')||[{id:1,t:'15 dk kitap okudun mu?',c:'Eğitim',p:2,i:'📖',d:true},{id:2,t:'Ödevlerini yaptın mı?',c:'Eğitim',p:3,i:'✏️',d:true},{id:3,t:'Yatağını topladın mı?',c:'Düzen',p:2,i:'🛏️',d:true},{id:4,t:'Dişlerini fırçaladın mı?',c:'Bakım',p:1,i:'🦷',d:true},{id:5,t:'Oyuncaklarını topladın mı?',c:'Düzen',p:2,i:'🧸',d:false}];
let stars=Number(localStorage.elifPreviewStars||125); const rewards=[['🎁','Küçük Sürpriz',10],['🍦','Dondurma Günü',20],['🎮','Oyun Saati Bonusu',30],['🎬','Sinema Günü',50],['🎉','Büyük Ödül',100]]; const hist=[14,18,12,20,21,8,10];
function save(){localStorage.elifPreviewTasks=JSON.stringify(tasks);localStorage.elifPreviewStars=stars;document.getElementById('stars').textContent=stars}
function stats(){let done=tasks.filter(x=>x.d).length;return {done,total:tasks.length,pct:Math.round(done/tasks.length*100),today:tasks.filter(x=>x.d).reduce((s,x)=>s+x.p,0)}}
function taskHTML(big=false){return tasks.map(x=>`<div class="task ${x.d?'done':''}" onclick="toggle(${x.id})"><span style="font-size:27px">${x.i}</span><b>${x.t}<br><small>${x.c}</small></b><strong>+${x.p} ⭐</strong><em>${x.d?'✓':''}</em></div>`).join('')}
function render(){save();let s=stats();home.innerHTML=`<div class="card span3"><h2>Bugünkü İlerlemen</h2><div style="display:flex;gap:20px;align-items:center"><div class="ring" style="--pct:${s.pct}%"><b>${s.pct}%</b></div><div><h2>${s.done}/${s.total} görev</h2><div class="bar"><i style="width:${s.pct}%"></i></div></div></div></div><div class="card span3"><h2>Sürpriz Kutu</h2><div style="font-size:62px">🧰</div><b>${25+s.today}/30 yıldız</b><div class="bar"><i style="width:${Math.min(100,(25+s.today)/30*100)}%"></i></div></div><div class="card span6"><h2>Günlük Motivasyon</h2><div style="font-size:70px">🦄</div><h2>Küçük adımlar, büyük değişimler yaratır! 🌈</h2></div><div class="card span4"><h2>Bugünkü Görevlerim</h2>${taskHTML()}<button class="primary" onclick="show('tasks')">Tüm Görevleri Gör</button></div><div class="card span4"><h2>Mini Oyunlar</h2><div class="games">${gameCards()}</div></div><div class="card span4"><h2>Ödüller Dükkanı</h2>${rewardList()}</div>`;tasksSec();gamesSec();mapSec();badgesSec();parentSec();}
function tasksSec(){tasks.innerHTML=`<h2>Bugünkü Görevler</h2>${taskHTML(true)}<h2>Günün Toplamı: ⭐ ${stats().today}</h2>`}
function gameCards(){return [['🐼','Eşleştirme'],['⭐','Yıldız Toplama'],['🎈','Balon Patlatma'],['🔤','Kelime Bulmaca']].map(g=>`<div class="game"><span>${g[0]}</span><b>${g[1]}</b><button>Oyna</button></div>`).join('')}
function gamesSec(){games.innerHTML=`<h2>Mini Oyunlar</h2><div class="games">${gameCards()}</div>`}
function mapSec(){map.innerHTML=`<h2>Macera Haritası</h2><div class="map"><div class="castle">🏰</div><div class="node n1">1</div><div class="node n2">2</div><div class="node n3">3</div><div class="node n4">4</div><div class="node n5">5</div><div class="treasure">🧰</div></div><h2>Seviye 5: Harika!</h2><div class="bar"><i style="width:64%"></i></div>`}
function badgesSec(){badges.innerHTML=`<h2>Rozetler</h2><div class="badges">${['📚 Kitap Kurdu','🖐️ Süper Yardımcı','🛏️ Düzen Şampiyonu','🥉 3 Gün Seri','🏅 7 Gün Seri','🔒 30 Yıldız Kulübü'].map(x=>`<div class="badge"><span>${x.split(' ')[0]}</span><b>${x.substring(2)}</b></div>`).join('')}</div>`}
function rewardList(){return `<div class="rewards">${rewards.map(r=>`<div class="reward"><span>${r[0]}</span><b>${r[1]}</b><small>${r[2]} ⭐</small></div>`).join('')}</div>`}
function parentSec(){parent.innerHTML=`<h2>Ebeveyn Yönetim Paneli</h2><form class="form" onsubmit="addTask(event)"><input id="newTask" placeholder="Yeni görev adı"><select id="newCat"><option>Eğitim</option><option>Düzen</option><option>Bakım</option><option>Yardım</option></select><input id="newPts" type="number" value="2"><select id="newIcon"><option>📖</option><option>✏️</option><option>🛏️</option><option>🦷</option><option>🧸</option></select><button class="primary">Ekle</button></form><table class="table"><tr><th>Görev</th><th>Kategori</th><th>Puan</th><th></th></tr>${tasks.map(x=>`<tr><td>${x.i} ${x.t}</td><td>${x.c}</td><td>${x.p} ⭐</td><td><button class="del" onclick="delTask(${x.id})">Sil</button></td></tr>`).join('')}</table><h2>Son 7 Gün</h2><div class="chart">${hist.map(x=>`<div class="col"><i style="height:${x*6}px"></i><b>${x}</b></div>`).join('')}</div>`}
function toggle(id){let t=tasks.find(x=>x.id===id);t.d=!t.d;stars+=t.d?t.p:-t.p;render()}
function addTask(e){e.preventDefault();tasks.unshift({id:Date.now(),t:newTask.value||'Yeni görev',c:newCat.value,p:Number(newPts.value||1),i:newIcon.value,d:false});render()}
function delTask(id){tasks=tasks.filter(x=>x.id!==id);render()}
function show(id,btn){document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on')); if(btn)btn.classList.add('on')}
render();
</script>
</body>
</html>
